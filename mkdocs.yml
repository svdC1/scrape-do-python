site_name: scrape-do-python
site_url: https://svdc1.github.io/scrape-do-python
repo_url: https://github.com/svdC1/scrape-do-python
repo_name: svdC1/scrape-do-python
theme:
  name: material
  font:
    code: Roboto Mono
  features:
    - header.autohide
    - navigation.footer
    - content.tooltips
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - navigation.tracking
    - navigation.tabs
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: slate
      primary: black
      accent: deep purple
nav:
  - Home: index.md
  - Roadmap: roadmap.md
  - Changelog: changelog.md
  - Contributing: contributing.md
  - API Reference:
      - Client: client.md
      - Async Client: async_client.md
      - Proxy Client: proxy_client.md
      - Async Proxy Client: async_proxy_client.md
      - Models:
          - Enums: models/enums.md
          - Parameters: models/parameters.md
          - Browser Actions: models/browser_actions.md
          - Request: models/request.md
          - Response: models/response.md
      - Exceptions: exceptions.md
      - Constants: constants.md
plugins:
  - mkdocstrings:
      handlers:
        python:
          inventories:
            - https://docs.python.org/3/objects.inv
            - https://docs.pydantic.dev/latest/objects.inv
            - https://typing-extensions.readthedocs.io/en/latest/objects.inv

          options:
            show_root_heading: true
            show_root_toc_entry: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            docstring_style: google
            docstring_options:
              warn_unknown_params: false
            docstring_section_style: table
            show_root_full_path: false
            show_object_full_path: false
            show_root_members_full_path: false
            show_source: false
            show_submodules: true
          paths:
            ["./src/"]
  - search
  - autorefs:
      resolve_closest: true
      link_titles: true
markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.betterem
  - pymdownx.keys
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.magiclink
  - pymdownx.blocks.caption
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

hooks:
  - docs/autoref_hooks.py