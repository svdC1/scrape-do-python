name: Integration Tests
on:
  pull_request:
    branches: [ "main" ]
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
  
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
  
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy ephemeral go-httpbin
        id: deploy_httpbin
        run: |
          SERVICE="scrape-do-httpbin-${{ github.run_id }}"
          gcloud run deploy "$SERVICE" \
            --image=ghcr.io/mccutchen/go-httpbin:latest \
            --region=us-central1 \
            --port=8080 \
            --allow-unauthenticated \
            --max-instances=2 \
            --memory=128Mi \
            --cpu=1 \
            --quiet
          URL=$(gcloud run services describe "$SERVICE" \
            --region=us-central1 \
            --format='value(status.url)')
          echo "HTTPBIN_BASE=$URL" >> "$GITHUB_ENV"
          echo "service_name=$SERVICE" >> "$GITHUB_OUTPUT"

      - name: Run Integration Tests
        env:
          SCRAPE_DO_API_KEY: ${{secrets.SCRAPE_DO_API_KEY}}
        run: pytest tests/integration/ --cov --junitxml=junit.xml

      - name: Tear down go-httpbin
        if: always()
        run: |
          gcloud run services delete \
            "${{ steps.deploy_httpbin.outputs.service_name }}" \
            --region=us-central1 \
            --quiet || true

      - name: Upload Test Logs
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: integration-run-logs
          path: logs/*.log
          retention-days: 7
    
      - name: Upload Coverage To Codecov
        uses: codecov/codecov-action@v5
        with:
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Test Results To Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          flags: integration
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}
