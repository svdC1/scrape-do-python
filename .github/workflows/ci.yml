name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [ published ]

jobs:
  # ---------------------------------------------------------
  # Lint & Type-Check (3.13 only)
  # ---------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint with Ruff
        run: ruff check .

      - name: Strict Type Checking with Mypy
        run: mypy src/

  # ---------------------------------------------------------
  # Unit Tests (matrix across every supported Python version)
  # ---------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: pytest tests/unit/ --cov --junitxml=junit.xml

      - name: Upload Coverage To Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v5
        with:
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Test Results To Codecov
        if: ${{ !cancelled() && matrix.python-version == '3.13' }}
        uses: codecov/codecov-action@v5
        with:
          flags: unit
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------
  # Build & Publish to PyPI (Runs ONLY on Releases)
  # ---------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: [lint, test]
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    
    environment:
      name: pypi
      url: https://pypi.org/p/scrape-do-python
    permissions:
      id-token: write 
      contents: read
      
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python -m pip install build

      - name: Build the package (sdist and wheel)
        run: python -m build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1