name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [ published ]

jobs:
  # ---------------------------------------------------------
  # Code Quality & Testing (Runs on every push/PR)
  # ---------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint with Ruff
        run: ruff check .

      - name: Strict Type Checking with Mypy
        run: mypy src/

      - name: Run Tests with Pytest
        run: pytest

  # ---------------------------------------------------------
  # Build & Publish to PyPI (Runs ONLY on Releases)
  # ---------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: test
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    
    environment:
      name: pypi
      url: https://pypi.org/p/scrape-do
    permissions:
      id-token: write 
      contents: read
      
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python -m pip install build

      - name: Build the package (sdist and wheel)
        run: python -m build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1